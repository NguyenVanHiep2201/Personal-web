<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Trang cá nhân - NGUYỄN VĂN HIỆP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar">
    <ul class="nav-links">
      <li><a href="index.html" class="active">Trang chủ</a></li>
      <li><a href="about.html">Giới thiệu</a></li>
      <li><a href="blogs.html">Bài viết</a></li>
      <li><a href="projects.html">Dự án</a></li>
      <li><a href="contact.html">Liên hệ</a></li>
    </ul>
    <div class="datetime-widget" id="datetimeWidget"></div>
  </nav>

  <header class="hero-section">
    <img src="08.2019.jpg" alt="Avatar" class="avatar">
    <h1>NGUYỄN VĂN HIỆP</h1>
    <p class="hero-subtitle">"A journey of a thousand miles begins with a single step"</p>
  </header>

  <main class="container">
    <input type="text" id="searchInput" style="width:100%; padding:12px; border-radius:20px; border:1px solid #ddd; margin-bottom: 20px;" placeholder="Tìm kiếm...">
    
    <h2 class="section-title">Dự án của tôi</h2>
    <div class="grid-layout" id="projectList">
      <div class="card"><h3>Thùng rác thông minh</h3><p>Dự án sử dụng ESP32...</p></div>
      <div class="card"><h3>PLC Web Control</h3><p>Điều khiển qua Flask và Modbus...</p></div>
    </div>
  </main>

  <script>
    function updateDateTime() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('vi-VN', { timeZone: 'Asia/Ho_Chi_Minh' });
      const dateStr = now.toLocaleDateString('vi-VN', { timeZone: 'Asia/Ho_Chi_Minh' });
      const lunarStr = new Intl.DateTimeFormat('vi-VN', { timeZone: 'Asia/Ho_Chi_Minh', calendar: 'chinese', day: 'numeric', month: 'numeric' }).format(now);
      
      document.getElementById('datetimeWidget').innerHTML = 
        `<div style="font-weight:bold; color:var(--primary)">${timeStr}</div>
         <div style="font-size:0.75rem">DL: ${dateStr} | ÂL: ${lunarStr}</div>`;
    }
    setInterval(updateDateTime, 1000);
    updateDateTime();
  </script>
</body>
</html>
